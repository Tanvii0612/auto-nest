<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AutoNest</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-dot"></span>Auto<span>Nest</span></a>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle">🌙</button>
      <a href="register.html" class="btn-primary">Create Account</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="nav-logo" style="justify-content:center;font-size:1.8rem">
        <span class="logo-dot"></span>Auto<span style="color:var(--teal)">Nest</span>
      </div>
    </div>
    <h2 class="auth-title">Welcome back 👋</h2>
    <p class="auth-sub">Sign in to manage your bookings and saved services.</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" class="form-input padded" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="error-msg" id="loginEmailErr"></div>
      </div>
      <div class="form-group">
        <label for="loginPass">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input padded" id="loginPass" placeholder="Your password" required />
        </div>
        <div class="error-msg" id="loginPassErr"></div>
      </div>
      <div style="text-align:right;margin-bottom:1.25rem">
        <a href="#" style="font-size:.85rem;color:var(--teal)">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary w-full btn-lg">Sign In →</button>
    </form>

    <div class="form-divider">or continue with</div>
    <div style="display:flex;gap:.75rem">
      <button class="social-btn" style="flex:1">🇬 Google</button>
      <button class="social-btn" style="flex:1">📘 Facebook</button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one →</a>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
